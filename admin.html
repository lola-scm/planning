<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Horaires</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Icône sur l'écran d'accueil iPad/iPhone -->
  <link rel="apple-touch-icon" href="icon.png">
  <!-- Nom affiché sous l'icône -->
  <meta name="apple-mobile-web-app-title" content="Planning">
  <!-- S'ouvre sans la barre Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<header>
  <div class="logo">mes<em>horaires</em> <span>/ Admin</span></div>
  <a class="header-link" href="index.html">← Tablette</a>
</header>

<main>

  <!-- Onglets -->
  <div class="tabs">
    <button class="tab active" onclick="afficherOnglet('employes')">Employés</button>
    <button class="tab" onclick="afficherOnglet('recettes')">Recettes</button>
  </div>

  <!-- Panel employés -->
  <div id="panel-emps" class="panel active">
    <div class="toolbar">
      <input class="search" type="text" placeholder="Rechercher…" oninput="afficherTableauEmployes(this.value)">
      <div class="flex-gap">
        <button class="btn-sm btn-primary" onclick="ouvrirFormulaireEmploye()">+ Ajouter</button>
      </div>
    </div>
    <table>
      <thead>
        <tr><th>Nom</th><th>Prénom</th><th>Poste</th><th>Actions</th></tr>
      </thead>
      <tbody id="emp-tbody"></tbody>
    </table>
  </div>

  <!-- Panel recettes -->
  <div id="panel-recettes" class="panel">
    <div class="toolbar">
      <input class="search" type="text" placeholder="Rechercher une recette…" oninput="afficherTableauRecettes(this.value)">
      <div class="flex-gap">
        <select class="form-input" id="filtre-categorie" onchange="afficherTableauRecettes()" style="width:auto;">
          <option value="">Toutes catégories</option>
          <option value="Crêpes">Crêpes</option>
          <option value="Galette">Galette</option>
          <option value="Salade">Salade</option>
          <option value="Préparation">Préparation</option>
          <option value="Cocktail">Cocktail</option>
        </select>
        <button class="btn-sm btn-primary" onclick="ouvrirFormulaireRecette()">+ Ajouter</button>
      </div>
    </div>
    <table>
      <thead>
        <tr><th>Nom</th><th>Catégorie</th><th>Portions</th><th>Coût/portion</th><th>Actions</th></tr>
      </thead>
      <tbody id="rec-tbody"></tbody>
    </table>
  </div>

  <!-- Fenêtre détails employé -->
  <div class="overlay" id="details-overlay">
    <div class="modal">
      <button class="modal-x" onclick="fermerDetailsEmploye()">✕</button>
      <div class="modal-title">Détails employé</div>
      <div id="details-content"></div>
      <div class="modal-actions">
        <button class="btn btn-historique" style="margin-top:10px;" onclick="ouvrirHistorique()">Voir mes horaires</button>
        <button class="btn btn-save" style="margin-top:10px;" onclick="exporterCSV()">⬇ Exporter CSV</button>
        <div id="historique-overlay" class="overlay" style="display:none;">
          <div class="modal">
            <button class="modal-x" onclick="fermerHistorique()">✕</button>
            <div class="modal-title">Historique de l'employé</div>
            <table>
              <thead>
                <tr><th>Date</th><th>Début</th><th>Fin</th><th>Durée (h)</th></tr>
              </thead>
              <tbody id="historique-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- Fenêtre ajout / modification d'un employé -->
<div class="overlay" id="emp-overlay">
  <div class="modal">
    <button class="modal-x" onclick="fermerFormulaireEmploye()">✕</button>
    <div class="modal-title" id="emp-modal-titre">Nouvel employé</div>
    <div class="form-group">
      <label class="form-label">Prénom</label>
      <input class="form-input" id="fe-prenom" type="text" placeholder="Prénom">
    </div>
    <div class="form-group">
      <label class="form-label">Nom</label>
      <input class="form-input" id="fe-nom" type="text" placeholder="Nom">
    </div>
    <div class="form-group">
      <label class="form-label">Poste</label>
      <input class="form-input" id="fe-poste" type="text" placeholder="Ex : Cuisinier, Manager…">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="fermerFormulaireEmploye()">Annuler</button>
      <button class="btn btn-save" onclick="sauvegarderEmploye()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal export CSV -->
<div class="overlay" id="export-overlay">
  <div class="modal">
    <button class="modal-x" onclick="fermerExportModal()">✕</button>
    <div class="modal-title">Exporter les horaires</div>
    <div class="form-group">
      <label class="form-label">Sélectionner le mois</label>
      <input class="form-input" type="month" id="export-mois">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="fermerExportModal()">Annuler</button>
      <button class="btn btn-save" onclick="genererCSV()">⬇ Télécharger CSV</button>
    </div>
  </div>
</div>

<!-- Modal formulaire recette -->
<div class="overlay" id="rec-overlay">
  <div class="modal" style="max-width:600px;width:95%;overflow-y:auto;max-height:90vh;">
    <button class="modal-x" onclick="fermerFormulaireRecette()">✕</button>
    <div class="modal-title" id="rec-modal-titre">Nouvelle recette</div>
    <div class="form-group">
      <label class="form-label">Nom</label>
      <input class="form-input" id="fr-nom" type="text" placeholder="Nom de la recette">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <select class="form-input" id="fr-categorie">
          <option value="Crêpes">Crêpes</option>
          <option value="Galette">Galette</option>
          <option value="Salade">Salade</option>
          <option value="Préparation">Préparation</option>
          <option value="Cocktail">Cocktail</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Nombre de portions</label>
        <input class="form-input" id="fr-portions" type="number" min="1" value="1">
      </div>
    </div>

    <div class="form-label" style="margin-bottom:6px;">Ingrédients</div>
    <div id="ing-liste"></div>
    <button class="btn-sm btn-primary" onclick="ajouterIngredient()" style="margin-top:6px;">+ Ingrédient</button>

    <div class="form-label" style="margin:14px 0 6px;">Étapes</div>
    <div id="etapes-liste"></div>
    <button class="btn-sm btn-primary" onclick="ajouterEtape()" style="margin-top:6px;">+ Étape</button>

    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-cancel" onclick="fermerFormulaireRecette()">Annuler</button>
      <button class="btn btn-save" onclick="sauvegarderRecette()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal voir recette -->
<div class="overlay" id="rec-view-overlay">
  <div class="modal" style="max-width:620px;width:95%;overflow-y:auto;max-height:90vh;">
    <button class="modal-x" onclick="fermerVoirRecette()">✕</button>
    <div class="modal-title" id="rv-nom"></div>
    <div style="color:var(--muted);margin-bottom:12px;" id="rv-categorie"></div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <label class="form-label" style="margin:0;">Portions :</label>
      <input class="form-input" id="rv-portions-ajust" type="number" min="1" style="width:70px;" oninput="ajusterPortions()">
      <span style="color:var(--muted);font-size:0.85em;">(base : <span id="rv-portions-base"></span>)</span>
    </div>

    <div id="rv-ingredients" style="margin-bottom:16px;"></div>

    <div style="display:flex;gap:20px;margin-bottom:16px;">
      <div class="recap-box"><div class="recap-label">Coût total</div><div class="recap-val" id="rv-cout-total">-</div></div>
      <div class="recap-box"><div class="recap-label">Coût / portion</div><div class="recap-val" id="rv-cout-portion">-</div></div>
    </div>

    <div class="form-label" style="margin-bottom:8px;">Étapes</div>
    <div id="rv-etapes"></div>

    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-cancel" onclick="fermerVoirRecette()">Fermer</button>
      <button class="btn btn-save" onclick="exporterPDFRecette()">🖨 Imprimer / PDF</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="data.js"></script>
<script type="module" src="admin.js"></script>
<script type="module" src="recettes.js"></script>
</body>
</html>
